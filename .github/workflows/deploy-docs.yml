name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs_site/**'
      - 'plugins/**'
      - 'generate_docs.py'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs_site
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Install dependencies
        run: dart pub get

      - name: Generate plugin docs
        run: python3 ../generate_docs.py

      - name: Build static site
        run: jaspr build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs_site/build/jaspr

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
